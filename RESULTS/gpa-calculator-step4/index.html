<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator Pro - Step 4</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">GPA Calculator Pro</h1>
        
        <div id="result" class="mb-4"></div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form id="gpaForm">
                    <div class="form-row mb-4">
                        <div class="col-md-8">
                            <label class="font-weight-bold">Student Full Name</label>
                            <input type="text" name="student_name" class="form-control" placeholder="Enter student name" required>
                        </div>
                        <div class="col-md-4">
                            <label class="font-weight-bold">Semester</label>
                            <select name="semester" class="form-control">
                                <option value="Semester 1">Semester 1</option>
                                <option value="Semester 2">Semester 2</option>
                            </select>
                        </div>
                    </div>
                    <hr>
                    <div id="courses">
                        <div class="course-row form-row mb-3">
                            <div class="col-md-6">
                                <input type="text" name="course[]" class="form-control" placeholder="Course Name" required>
                            </div>
                            <div class="col-md-3">
                                <input type="number" name="credits[]" class="form-control" placeholder="Credits" min="1" required>
                            </div>
                            <div class="col-md-3">
                                <select name="grade[]" class="form-control">
                                    <option value="4.0">A (4.0)</option>
                                    <option value="3.0">B (3.0)</option>
                                    <option value="2.0">C (2.0)</option>
                                    <option value="1.0">D (1.0)</option>
                                    <option value="0.0">F (0.0)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <button type="button" id="addCourse" class="btn btn-outline-secondary btn-sm mb-4">+ Add Another Course</button>
                    <button type="submit" class="btn btn-primary btn-block btn-lg">Calculate & Display GPA</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js" defer></script>
</body>
</html>
